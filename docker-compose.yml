services:
  orbital:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbital_insight
    restart: unless-stopped

    ports:
      - "8000:8000"   # FastAPI  — grader / REST API
      - "80:80"       # HTML frontend
      - "8501:8501"   # Streamlit dashboard

    volumes:
      # Model artefacts — retrain on host, container picks them up instantly
      - ./backend/collision_model.pkl:/app/backend/collision_model.pkl
      - ./backend/model_features.pkl:/app/backend/model_features.pkl
      - ./backend/model_threshold.pkl:/app/backend/model_threshold.pkl
      - ./backend/model_meta.json:/app/backend/model_meta.json
      # Feedback loop CSVs persist across restarts
      - ./backend/missed_cases.csv:/app/backend/missed_cases.csv
      - ./backend/training_data.csv:/app/backend/training_data.csv
      # SHAP / report images (generated by train_model.py)
      - ./backend/importance.png:/app/backend/importance.png
      - ./backend/shap_beeswarm.png:/app/backend/shap_beeswarm.png
      - ./backend/model_report.png:/app/backend/model_report.png

    environment:
      - BACKEND_URL=http://localhost:8000/api
      - FRONTEND_URL=http://localhost:80
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"