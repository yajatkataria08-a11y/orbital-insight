# ══════════════════════════════════════════════════════════════════════════════
#  Orbital Insight ACM — docker-compose
#
#  Services:
#    backend   → FastAPI + XGBoost simulation   http://localhost:8000
#    frontend  → Static dashboard (nginx)        http://localhost:80
#    streamlit → Analytics UI                    http://localhost:8501
#
#  Quick start:
#    docker-compose up --build
#
#  Rebuild only one service:
#    docker-compose up --build backend
#
#  View live logs:
#    docker-compose logs -f backend
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: acm-backend:latest
    container_name: acm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persists logs, missed_cases.csv, and hot-swapped models across restarts
      - acm_runtime:/app/runtime
    environment:
      LOG_LEVEL: INFO
      STD_DRY_MASS:          "500.0"
      STD_FUEL_MASS:         "50.0"
      STD_ISP:               "300.0"
      MAX_DV_PER_BURN:       "0.015"
      THERMAL_COOLDOWN:      "600.0"
      CONJ_THRESH:           "0.1"
      PC_MANEUVER_THRESHOLD: "1e-6"
      SECRET_KEY:            "orbital-acm-change-in-prod"
      JWT_ALGORITHM:         "HS256"
      JWT_EXPIRE_MINUTES:    "480"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ready')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  # ── Nginx static frontend ────────────────────────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    container_name: acm_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Streamlit analytics dashboard ───────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: streamlit
    image: acm-streamlit:latest
    container_name: acm_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: "http://backend:8000/api"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  acm_runtime:
    driver: local